<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premiar · Acceso</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#F4F4F6;--surface:#FFFFFF;--border:#E4E4EC;
      --primary:#7C75D8;--primary-hover:#6A63C4;
      --text:#1A1A2E;--secondary:#6B6B80;--muted:#9B9BAA;
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
    .logo{margin-bottom:24px}
    .logo img{height:40px;display:block;margin:0 auto}
    .divider{width:32px;height:2px;background:var(--primary);margin:0 auto 28px;border-radius:2px}
    h1{font-size:18px;font-weight:500;line-height:1.35;margin-bottom:8px;color:var(--text)}
    h1 em{color:var(--primary);font-style:normal}
    .sub{font-size:13px;color:var(--secondary);line-height:1.7;margin-bottom:28px}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:10px 18px;border-radius:8px;background:var(--text);color:#fff;font-family:inherit;font-size:13px;font-weight:500;text-decoration:none;transition:background .15s,transform .15s;border:none;cursor:pointer}
    .btn-google:hover{background:#2a2a4a;transform:translateY(-1px)}
    .btn-google:active{transform:scale(.98)}
    .google-icon{width:18px;height:18px;flex-shrink:0}
    .error{margin-bottom:20px;padding:10px 16px;background:rgba(217,64,64,.06);border:1px solid rgba(217,64,64,.18);border-radius:8px;font-size:13px;color:#D94040}
    .footer-note{margin-top:20px;font-size:12px;color:var(--muted);line-height:1.6}
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/logo_premiar.png" alt="Premiar Caución"></div>
  <div class="divider"></div>

  <h1>Todo tu universo a una<br><em>pregunta de distancia.</em></h1>
  <p class="sub">Ingresá con tu cuenta de Google para acceder a Oracle y Business.</p>

  <div id="error-box" style="display:none" class="error">
    Tu cuenta no tiene acceso a esta plataforma. Contactá al administrador.
  </div>

  <a href="/auth/google" class="btn-google">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar con Google
  </a>

  <p class="footer-note">
    Plataforma de uso interno · Premiar Caución<br>
    Solo cuentas autorizadas pueden acceder
  </p>
</div>

<script>
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('error-box').style.display = 'block';
  }
</script>
</body>
</html>
